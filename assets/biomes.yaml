# =============================================================================
#  World generation — "BETA 1.7.3 ISLAND + FLOATING ISLANDS"
# =============================================================================
#  READ BY: vg::TerrainGenerator (src/world/TerrainGenerator.{h,cpp}).
#
#  Goal: the look of classic Minecraft Beta 1.7.3 — rolling grassy hills, oak
#  forests, sandy shores, dramatic overhangs and cliffs — shaped into ONE big
#  island, with sparse GRASS-TOPPED FLOATING ISLANDS drifting in the sky above it.
#
#  Layout (the world is 256 tall, sea level 64 like classic MC):
#    deep ocean  ->  sand beach  ->  oak/birch forest  ->  grassy highlands  ->
#    snow-capped stone peaks ...  and, high overhead, floating sky islands.
#
#  Pure function of world coords (deterministic / stream-safe). After an edit the
#  --selftest hash changes — that's expected. Heights are BLOCKS vs sea level.
# =============================================================================

# Classic Minecraft sea level. The ocean fills to here; land height is measured
# relative to it. With a 256-tall world this leaves ~30 below for the seabed and
# ~190 above for hills, peaks and the sky-island layer.
sea_level: 12
# Snow caps any surface this many blocks above sea — only the high peaks reach it.
snow_line: 112

# --- Shape noises -----------------------------------------------------------
# frequency = feature size (↑ = smaller/busier); octaves = detail (↑ = craggier).
# Continentalness drives the gentle ROLLING of the interior (the Beta-1.7.3 hills).
continentalness: {frequency: 0.006, octaves: 8}
erosion: {frequency: 0.004, octaves: 3}           # where peaks are tall vs worn
# Ridged peaks = the mountain crests at the island core.
peaks:
  frequency: 0.008
  octaves: 4
  layers:
  - {type: ridged, frequency: 0.012, octaves: 5, weight: 1.6}                       # sharp dominant ridges
  - {type: ridged, frequency: 0.028, octaves: 3, weight: 0.9, offset: [1800, -900]} # secondary spikes
  - {type: ridged, frequency: 0.055, octaves: 2, weight: 0.5, offset: [-2400, 1300]} # crag jitter

# Unused by selection now (climate removed) but kept as decorrelated noise sources.
temperature: {frequency: 0.003}
humidity: {frequency: 0.005}

# --- The island -------------------------------------------------------------
#   radius/inner   size + core fraction (inner ignored when island_profile_spline set)
#   coast_warp     coastline raggedness (↑ = more fjords/capes)
#   land_base      coastal land height vs sea
#   peak_height    radial rise to the core (the macro mountain)
#   interior_var   continentalness -> rolling hills amplitude (the Beta-1.7.3 roll)
#   ocean_floor    seabed depth far out
island:
  enabled: 1
  center: [0, 0]
  radius: 2560         # big island — room for long beach / plains / forest / hills rings
  inner: 0.1
  coast_warp: 2400     # gently irregular shoreline (lower = a cleaner, longer beach)
  land_base: 0         # the coast sits right around sea level
  peak_height: 128     # the core rises into the PEAKS band — a real mountainous centre
  interior_var: 150    # rolling green hills across the interior
  ocean_floor: -8      # a proper deep-ish ocean around the island

# --- 3D terrain: overhangs, cliffs & FLOATING ISLANDS -----------------------
#   amplitude       overhang/cliff intensity (blocks of 3D swell)
#   density.layers  the noise blend that carves the overhangs
#   float_threshold sky-island cutoff (↓ = more/bigger floats); float_reach = how
#                   far above the surface they form; float_gap = min gap above land
terrain3d:
  enabled: 1
  amplitude: 0
  density:
    layers:
    - {type: perlin, frequency: 0.013, octaves: 4, weight: 3}                        # main overhang carve
    - {type: ridged, frequency: 0.02, octaves: 3, weight: 1.2, offset: [600, 200]}   # sharp cliff edges
    - {type: perlin, frequency: 0.045, octaves: 2, weight: 0.8}                      # fine roughness
    - {type: perlin, frequency: 0.0035, octaves: 3, weight: 1}                       # broad swell
  # Floating islands ON: a scatter of chunky grass-topped sky-land above the LAND.
  # ~0.30 = a generous scatter, ~0.40 = rare; low float_freq = big islands. reach 80
  # keeps them under the 256 ceiling. (Beaches/ocean and the tall peaks turn this OFF.)
  float_threshold: 0.14
  float_freq: 0.017
  float_gap: 16
  float_reach: 20
  # Smooth the swell down at the waterline so beaches read as gentle sand, not cliffs.
  coast_flatten: {enabled: 1, range: 6, min: 50000000}

# erosion noise (-1..1) -> mountain crest height (blocks). Low erosion (core) -> tall
# spiky peaks. A steep drop between rows = a sharp mountain front (rigid, jagged top).
erosion_spline:
- [-0.95, 54]
- [-0.55, 36]
- [-0.20, 12]
- [0.30, 3]
- [1.0, 0]

# Island radial profile: x = distance from core (0) to coast (1), y = land rise.
# A FLAT high plateau across the inner third (y stays 1.0 to u=0.34) so the peaks
# core forms reliably despite the domain-warp, then a LONG gentle descent so the
# hills, forest, plains and beach each get a wide radial band.
island_profile_spline:
- [0, 1]
- [0.22, 1]
- [0.74, 0.55]
- [0.83, 0.5]
- [0.87, 0.34]
- [0.94, 0.15]
- [1, 0]
biomes:
# LONG sandy shoreline — also the low/underwater catch-all, so the OCEAN resolves to
# beach (floats OFF) instead of the peaks catch-all (which was making sky-sand over sea).
- name: beach
  elevation: [-3000, 6]
  top: sand
  filler: sand
  trees: 0
  terrain3d:
    amplitude: 0
    float_threshold: 1                       # no floating islands over sand / the sea
    coast_flatten: {enabled: 1, range: 32, min: -100}
    enabled: 1
    density:
      layers:
      - {type: perlin, frequency: 0.0001, octaves: 3, weight: 1}
      - {type: perlin, frequency: 0.001, octaves: 3, weight: 1}
      - {type: perlin, frequency: 1e-05, octaves: 3, weight: 1}

# PLAINS — flat open grassland with scattered oaks (low 3D swell = flat, not overhangy).
- name: plains
  elevation: [6, 30]
  top: grass
  filler: dirt
  trees: 0.06
  tree: oak
  tint: [0.66, 0.9, 0.45]
  terrain3d:
    amplitude: 8                             # flat plains, gentle relief

# Birch groves — organic patches (selection mask) within the forest band.
- name: birch_forest
  elevation: [24, 78]
  mask:
    threshold: 0.12
    width: 0.22
    falloff: smoothstep
    layers:
    - {type: perlin, frequency: 0.0045, octaves: 3, weight: 1}
  top: grass
  filler: dirt
  trees: 0.16
  tree: birch
  tint: [0.78, 0.93, 0.6]

# Oak forest — dense green woodland (catch-all for the forest band).
- name: oak_forest
  elevation: [24, 78]
  top: grass
  filler: dirt
  trees: 1
  tree: oak
  tint: [0.62, 0.86, 0.46]

# LONG rolling HILLS — grassy upland with trees, where the overhangs read best.
- name: highlands
  elevation: [74, 116]
  top: grass
  filler: dirt
  trees: 0.1
  tree: oak
  tint: [0.66, 0.8, 0.5]

# Spiky snow-capped stone peaks (snow via snow_line) with hardy pines on the slopes.
- name: peaks
  elevation: [112, 10000]
  top:
  - {name: stone, w: 1}
  - {name: cobblestone, w: 0.12}
  filler: stone
  trees: 0.1
  tree: pine
  terrain3d:
    amplitude: 97                            # jagged 3D relief on the crests
    float_threshold: 0.39                    # peaks are tall — no floats (they'd hit the ceiling)
    enabled: 1
    float_reach: 110
    coast_flatten:
      enabled: 0
    density:
      layers:
      - {type: perlin, frequency: 0.01, octaves: 3, weight: 5}
      - {type: perlin, frequency: 0.001, octaves: 3, weight: 1}
      - {type: perlin, frequency: 0.0001, octaves: 3, weight: 1}
