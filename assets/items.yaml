# =============================================================================
#  Item definitions  (tools, equipment — the non-placeable hotbar entries)
# =============================================================================
#  Loaded by vg::BlockRegistry RIGHT AFTER assets/blocks.yaml, as a continuation
#  of the same id space: the first item's id is blockCount-so-far, the next is
#  +1, and so on. Items live in the same registry as blocks because they are held
#  and selected in a hotbar slot exactly like a block — they just can't be placed
#  in the world (`placeable: false`, the default for anything with `tool:` or
#  `equip:`). Splitting them into their own file keeps blocks.yaml about the world
#  and this file about the things you carry.
#
#  Every key documented in blocks.yaml's header applies here too. The item-only
#  keys (recap):
#    tool           pickaxe|sword. Marks a tool; mines a block whose preferred_tool
#                   matches `tool_speed`x faster (BlockRegistry::breakSeconds).
#    tool_speed     mining-speed multiplier this tool gives its preferred blocks.
#    tier           harvest tier this tool provides (1 wood .. 4 mythril). A block
#                   drops only when mined with a matching tool of tier >= its
#                   harvest_level (see canHarvest()).
#    attack_damage  damage dealt in combat (swords; future mobs).
#    equip          head|chest|legs|feet|trinket. Which equip slot the item fills.
#    armor          damage-reduction points an armour piece grants.
#    speed_mul / jump_mul / regen   passive bonuses a trinket grants while equipped.
#    placeable      forced false here; right-click never places an item.
#
#  Inventory icons: items use a prerendered 16x16 sprite (assets/textures/icons/
#  <name>.png, baked by scripts/gen_icons.py) — for a flat tool/charm that is just
#  its own texture, drawn upright in the slot (not as an isometric cube).
# =============================================================================

# --- Tools (ISSUES #13B) ------------------------------------------------------
# A tool whose `tool:` matches a block's `preferred_tool:` mines it `tool_speed`x
# faster. No durability (they never wear out — a deliberate design choice).
- name: pickaxe
  tool: pickaxe
  tool_speed: 5.0
  tier: 3            # iron-tier; wood/stone/mythril tiers below
  textures:
    all: pickaxe.block.png
- name: sword
  tool: sword
  tool_speed: 1.0
  attack_damage: 4.0
  textures:
    all: sword.block.png

# Pickaxe tiers gate which ores yield a drop (a block drops only when mined with a
# matching tool of tier >= its harvest_level). The plain `pickaxe` above is the
# iron tier (3). These three fill out the wood->stone->iron->mythril ladder. They
# reuse pickaxe.block.png for now (per-tier icons are a later art pass).
- name: wood_pickaxe
  tool: pickaxe
  tool_speed: 2.0
  tier: 1
  textures:
    all: pickaxe.block.png
- name: stone_pickaxe
  tool: pickaxe
  tool_speed: 3.5
  tier: 2
  textures:
    all: pickaxe.block.png
- name: mythril_pickaxe
  tool: pickaxe
  tool_speed: 8.0
  tier: 4
  textures:
    all: pickaxe.block.png

# Hammer (ISSUES #16): the block-shaping tool. Not placed in the world — instead,
# hold it and left-click a block to apply the active shape (slab/stairs/post/wall),
# or Ctrl+left-click to rotate it; right-click opens the shape picker. No `textures:`,
# so it uses the ${name}.block.png convention (hammer.block.png, drawn by gen_hammer.py).
- name: hammer
  placeable: false

# --- Equipment: armour + trinkets (ISSUES #13B / #15) -------------------------
# Armour pieces slot into an equip slot and grant `armor` damage-reduction points
# (the player caps total reduction at 80%). Trinkets slot into a generic accessory
# slot and grant passive bonuses (speed/jump/regen). All non-placeable. Armour was
# trimmed to a single boots slot for now (ISSUES #15); iron_boots is the one piece.
- name: iron_boots
  equip: feet
  armor: 6.0          # 6 armour points -> 6% damage reduction
  textures:
    all: iron_boots.block.png
- name: swift_charm
  equip: trinket
  speed_mul: 1.35
  textures:
    all: swift_charm.block.png
- name: life_charm
  equip: trinket
  regen: 3.0
  textures:
    all: life_charm.block.png
