# Reeds that only grow near a shoreline / lake edge (near_water). Shows the
# near-water gate.
name: shore_reeds
scatter:
  density: 0.7
  spacing: 3
  surface: true
  near_water: 3            # only within ~3 blocks of a water column
  biomes: [plains, forest, savanna, swamp]
size: [1, 4, 1]
anchor: [0, 0, 0]
ops:
  - shape: column
    at: [0, 0, 0]
    radius: 0
    height: {min: 2, max: 3}
    block: [{name: tall_grass, w: 3}, {name: fern, w: 1}]
    block_pick: per_instance
    place: air_only
