# Cairn — a short stack of cobblestone, like a hiker's trail marker. Authored but
# OFF by default (density 0, matching the old world.yaml); bump scatter.density to
# scatter them on any land.
name: cairn
scatter: {density: 0.0, spacing: 30, surface: true}
size: [1, 5, 1]
anchor: [0, 0, 0]
ops:
  - shape: column
    at: [0, 0, 0]
    radius: 0
    height: {min: 2, max: 5}
    block: cobblestone
    place: air_only
