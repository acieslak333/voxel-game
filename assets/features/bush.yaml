# Forest-floor shrubs — a single sprite (bush / mushroom / fern) on damp shaded
# ground. Replaces the built-in bush/forest plant scatter.
name: bush
scatter: {density: 0.4, spacing: 5, surface: true, biomes: [forest, swamp, snowy]}
size: [1, 2, 1]
anchor: [0, 0, 0]
ops:
  - shape: box
    at: [0, 1, 0]
    size: [1, 1, 1]
    block: [{name: bush, w: 3}, {name: red_mushroom, w: 1}, {name: fern, w: 1}]
    block_pick: per_cell
    place: air_only
