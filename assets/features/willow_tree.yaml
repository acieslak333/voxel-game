# Willow — a wide low crown with a drooping leaf skirt (a thin shell cylinder ring
# hanging at the rim). Swamp.
name: willow_tree
scatter: {density: 0.65, spacing: 6, surface: true, biomes: [swamp]}
size: [9, 8, 9]
anchor: [4, 0, 4]
ops:
  - shape: ellipsoid
    at: [0, 3, 0]
    size: [9, 3, 9]
    block: willow_leaves
    place: air_only
  - shape: cylinder
    at: [0, 2, 0]
    radius: 4
    height: 2
    fill: shell
    block: willow_leaves
    place: air_only
  - shape: column
    at: [0, 0, 0]
    radius: 0
    height: 5
    block: willow_trunk
    place: air_only
