# Scattered rocks that come in THREE distinct forms — each instance randomly picks
# one (seam-safe, from the origin hash). Demonstrates feature variants: `ops` is form
# 1, each `variants[i].ops` is another. Authored in tools/feature_tool.py (the form
# tabs above the ops).
name: rock_varied
scatter: {density: 0.1, spacing: 22, surface: true}
size: [5, 5, 5]
anchor: [2, 0, 2]
ops:                       # form 1 — a round boulder
  - shape: sphere
    at: [0, 0, 0]
    radius: 2
    block: [{name: stone, w: 3}, {name: cobblestone, w: 1}]
    block_pick: per_cell
    place: force
variants:
  - ops:                   # form 2 — a squat cobble block
      - shape: box
        at: [0, 0, 0]
        size: [3, 2, 3]
        block: cobblestone
        place: force
  - ops:                   # form 3 — a little spire
      - shape: cone
        at: [0, 0, 0]
        radius: 2
        height: 4
        block: [{name: stone, w: 2}, {name: gravel, w: 1}]
        block_pick: per_cell
        place: force
