    at: [0, 0, 0]
    radius: 1
    height: 12
    block: cobblestone
    place: force
  - shape: spiral
    at: [0, 0, 0]
    radius: 4
    height: 12
    thickness: 1
    turns: 3
    block: oak_leaves
