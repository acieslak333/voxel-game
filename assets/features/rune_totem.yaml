# A hand-sculpted totem (shape: voxels) — explicit cells, not a brush. Authored in
# the feature tool's sculpt mode. OFF by default (density 0); bump scatter.density to
# scatter them, or just use it as a template for your own bespoke objects.
name: rune_totem
scatter: {density: 0.0, spacing: 40, surface: true}
size: [3, 5, 3]
anchor: [1, 0, 1]
ops:
  - shape: voxels
    at: [0, 0, 0]
    block: cobblestone
    place: force
    cells:
      - [0, 0, 0, cobblestone]
      - [0, 1, 0, cobblestone]
      - [0, 2, 0, cobblestone]
      - [0, 3, 0, glowstone]
      - [-1, 3, 0, cobblestone]
      - [1, 3, 0, cobblestone]
      - [0, 3, -1, cobblestone]
      - [0, 3, 1, cobblestone]
      - [0, 4, 0, glowstone]
