# A varying-size cube riddled with noise, mixing three blocks per-cell. Demonstrates
# "a cube of varying size + noise of varying block" — fill: noise carves the box, the
# weighted palette speckles it.
name: clay_blob
scatter:
  density: 0.10
  spacing: 50
  surface: true
size: [9, 7, 9]
anchor: [4, 0, 4]
ops:
  - shape: box
    at: [0, 0, 0]
    size: [ {min: 4, max: 7}, {min: 3, max: 5}, {min: 4, max: 7} ]
    fill: noise
    noise: {freq: 0.35, threshold: -0.1}
    block: [ {name: dirt, w: 2}, {name: gravel, w: 2}, {name: sand, w: 1} ]
    block_pick: per_cell
    place: force
