# Ground cover — a single sprite plant one block above the surface, mostly tall
# grass with the odd flower / fern (per-cell weighted pick). Dense, on temperate
# grass biomes. Replaces the built-in grass/flower scatter.
name: grass_flowers
scatter: {density: 0.7, spacing: 4, surface: true, biomes: [plains, oak_forest, birch_forest, highlands]}
size: [1, 2, 1]
anchor: [0, 0, 0]
ops:
  - shape: box
    at: [0, 1, 0]
    size: [1, 1, 1]
    block: [{name: tall_grass, w: 7}, {name: flower_red, w: 1}, {name: flower_yellow, w: 1}, {name: fern, w: 1}]
    block_pick: per_cell
    place: air_only
