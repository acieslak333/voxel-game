# Pine — a conical needle crown (cone op tapers to a point) on a tall trunk. The ONLY
# tree on the mountains (the `peaks` biome — bare stone + snow cap).
name: pine_tree
scatter: {density: 0.1, spacing: 6, surface: true, biomes: [peaks, highlands]}
size: [7, 12, 7]
anchor: [3, 0, 3]
ops:
  - shape: cone
    at: [0, 2, 0]
    radius: 3
    height: 8
    block: pine_leaves
    place: air_only
  - shape: column
    at: [0, 0, 0]
    radius: 0
    height: 8
    block: pine_trunk
    place: air_only
