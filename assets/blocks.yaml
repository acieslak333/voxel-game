# Flora leftovers (#13F): hanging vines (cross sprite, scattered in air under tree
# canopies) and lilypads (a flat pad floating on still water in swamps/wetlands).
# Appended at the END so existing block ids / saved chunks don't shift. Both default
# to a ${name}.block.png texture; non-solid + non-opaque so they don't cull/shadow.
