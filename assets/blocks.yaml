                         # own cell, unlike an opaque cube whose faces read neighbours)
  model:
    width: 8
  textures:
    top: pine_log_top.block.png
    bottom: pine_log_top.block.png
    side: pine_log_side.block.png
- name: pine_leaves
  hardness: 0.1
