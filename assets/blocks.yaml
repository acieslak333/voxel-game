# =============================================================================
#  Block definitions
# =============================================================================
#  Loaded at runtime by vg::BlockRegistry. This is a YAML sequence of blocks;
#  each block's id is its position in this list, so the FIRST entry must be
#  "air" (id 0 -- the default empty voxel). Code refers to blocks by name
#  (registry.idByName("stone")), so the order of the rest is free to change.
#
#  Per block:
#    name     required. Unique. Used by idByName().
#    solid    default false. Participates in collision.
#    opaque   default false. Hides the faces of neighbours touching it (meshing).
#    light    default 0. Light level (0..15) this block emits (e.g. glowstone).
#    light_color  default [1.00,0.66,0.32] (warm). Linear RGB hue of the emitted
#             light: a warm torch vs orange lava. Only used when light > 0.
#    hardness default 0. Seconds to break BY HAND (mining speed 1). 0 = instant
#             (foliage), bigger = tougher; <0 = unbreakable. A held tool whose
#             `tool:` matches this block's `preferred_tool:` mines it `tool_speed`x
#             faster (see BlockRegistry::breakSeconds; verified by --logictest).
#    preferred_tool  pickaxe|sword. Which tool speeds up mining THIS block.
#    --- item/tool keys (a tool is held & selected like a block, but not placed) ---
#    tool       pickaxe|sword. Marks this entry as a tool item (=> not placeable).
#    tool_speed default 1. Mining-speed multiplier this tool gives its preferred blocks.
#    attack_damage default 1. Damage dealt in combat (swords; future mobs).
#    placeable  default true for blocks, false for tools. Can it be placed in world?
#    textures map of face -> texture filename (under assets/textures/). Keys:
#               all                  every face
#               top / bottom / side  +Y / -Y / the four horizontal faces
#               negx posx negy posy negz posz   explicit single-face override
#             Later keys override earlier ones, so you can set `all` then
#             override `top`. A texture shared by several blocks/faces costs a
#             single texture-array layer (filenames are deduplicated).
#             A face value may also be a LIST of filenames (variants): the mesher
#             picks one per block position from a hash of its world XYZ, so the
#             block doesn't visibly tile. Generate the copies with `variants:` in
#             assets/textures.yaml. e.g. all: [stone.block.png, stone1.block.png].
# =============================================================================

- name: air
  solid: false
  opaque: false

- name: grass
  hardness: 0.6
  solid: true
  opaque: true
  textures:
    # Single texture per face. A face MAY instead list several textures (the mesher
    # random-picks one per block position so it doesn't tile — see the header note);
    # that variant logic is kept, just unused for now so every block looks uniform.
    top: grass_top.block.png
    side: grass_side.block.png
    bottom: dirt.block.png

- name: dirt
  hardness: 0.6
  solid: true
  opaque: true
  textures:
    all: dirt.block.png

- name: stone
  hardness: 1.5
  preferred_tool: pickaxe
  harvest_level: 1   # needs a wood pickaxe (or better) to drop
  solid: true
  opaque: true
  textures:
    all: stone.block.png

- name: sand
  hardness: 0.5
  solid: true
  opaque: true
  textures:
    all: sand.block.png

- name: gravel
  hardness: 0.6
  solid: true
  opaque: true
  textures:
    all: gravel.block.png

- name: cobblestone
  hardness: 2.0
  preferred_tool: pickaxe
  harvest_level: 1
  solid: true
  opaque: true
  textures:
    all: cobblestone.block.png

- name: planks
  hardness: 2.0
  solid: true
  opaque: true
  textures:
    all: planks.block.png

# Oriented logs (axis from Block::metadata) are future work; for now both caps
# use the ring texture and the four sides use bark.
- name: oak_log
  hardness: 2.0
  solid: true
  opaque: true
  textures:
    top: oak_log_top.block.png
    bottom: oak_log_top.block.png
    side: oak_log_side.block.png

# Emits light: `light` (0..15) seeds the world's block-light flood fill, so this
# glows in caves and at night independently of the sky.
- name: glowstone
  hardness: 0.3
  preferred_tool: pickaxe
  solid: true
  opaque: true
  light: 14
  light_color: [0.75, 0.35, 1.0]   # warm yellow-white glow
  textures:
    all: glowstone.block.png

# --- Trees -------------------------------------------------------------------
# A tree trunk: rendered as a centred 8/16-px-wide box (render: model), not a full
# cube, so trees look less blocky. solid (you can't walk through it) but non-opaque
# (it's thinner than the cell, so it must not cull neighbours or block light).
# Stacked vertically they form a continuous pole. `width` (in 1/16 px) tunes the
# thickness: 6 = slim, 8 = chunky, 16 = a full cube.
- name: oak_trunk
  hardness: 1.5
  solid: true
  opaque: false
  render: model
  light_opacity: 4       # trunk/column dims the sky below it (kept <15 so its own
                         # rendered cell still receives light — a model samples its
                         # own cell, unlike an opaque cube whose faces read neighbours)
  model:
    width: 12   # samples the centre 12px of the 16px bark (a part of it — never scaled)
  textures:
    top: oak_log_top.block.png
    bottom: oak_log_top.block.png
    side: oak_log_side.block.png

# Canopy leaves: a LEAFCUBE block — full voxel-cube faces AND the cross planes,
# all alpha-cutout, so the canopy reads as solid leaf blocks with fronds poking
# through. Non-solid (walk through) and non-opaque (light filters through, and the
# cube faces self-cull against adjacent leaves so a merged crown stays hollow).
- name: oak_leaves
  hardness: 0.1
  solid: false
  opaque: false
  render: leafcube
  light_opacity: 3       # canopy dims the sky a few levels -> dappled shade below
  textures:
    all: oak_leaves.block.png

# Ground bush: same cross primitive, its own brighter-green cutout texture.
- name: bush
  hardness: 0.0
  solid: false
  opaque: false
  render: cross
  light_opacity: 2       # leafy shrub casts a faint shadow (other cross plants stay 0)
  textures:
    all: bush.block.png

# --- Liquids (water & lava) --------------------------------------------------
# Not solid, so you swim/fall through. Water is NON-opaque: the mesher draws it in
# a separate translucent pass (so the seabed shows through), and — crucially —
# non-opaque lets the sky-light flood pass DOWN through it, so submerged terrain
# is lit instead of pitch black. Lava stays opaque (you can't see through molten
# rock) and emits light (glows in caves / at night via the block-light flood).
- name: water
  solid: false
  opaque: false
  textures:
    all: water.block.png
- name: lava
  solid: false
  opaque: true
  light: 13
  light_color: [1.00, 0.38, 0.10]   # deep molten orange-red
  textures:
    all: lava.block.png

# --- Ores --------------------------------------------------------------------
# Stone shot through with coloured mineral flecks. Plain opaque cubes; the
# generator scatters them in veins through the stone (assets/world.yaml `ores`).
- name: coal_ore
  hardness: 3.0
  preferred_tool: pickaxe
  harvest_level: 1
  solid: true
  opaque: true
  textures:
    all: coal_ore.block.png
- name: iron_ore
  hardness: 3.0
  preferred_tool: pickaxe
  harvest_level: 2
  solid: true
  opaque: true
  textures:
    all: iron_ore.block.png
- name: gold_ore
  hardness: 3.0
  preferred_tool: pickaxe
  harvest_level: 2
  solid: true
  opaque: true
  textures:
    all: gold_ore.block.png
- name: ruby_ore
  hardness: 4.0
  preferred_tool: pickaxe
  harvest_level: 3
  solid: true
  opaque: true
  textures:
    all: ruby_ore.block.png
- name: emerald_ore
  hardness: 4.0
  preferred_tool: pickaxe
  harvest_level: 3
  solid: true
  opaque: true
  textures:
    all: emerald_ore.block.png
- name: mythril_ore
  hardness: 5.0
  preferred_tool: pickaxe
  harvest_level: 3   # iron-minable (avoids a mythril-needs-mythril cycle); the
                     # mythril pickaxe is the speed reward, not a new gate
  solid: true
  opaque: true
  textures:
    all: mythril_ore.block.png

# --- Biome surface ------------------------------------------------------------
# Snow: the cold-biome / above-snow-line surface coat (see assets/biomes.yaml).
# Appended at the end so existing block ids (and saved chunks) don't shift.
- name: snow
  hardness: 0.1
  solid: true
  opaque: true
  textures:
    all: snow.block.png

# Tools and equipment (pickaxe, sword, hammer, charms, boots) are NOT blocks —
# they live in assets/items.yaml, loaded right after this file as a continuation
# of the same id space. This file is just the world's blocks.

# --- Containers (ISSUES #13B) -------------------------------------------------
# Chest: a placeable storage block with its own 27-slot grid. Right-click opens it;
# its contents persist to <save>/chests.dat keyed by world position. Appended last
# so existing ids/saved chunks don't shift.
- name: chest
  hardness: 2.5
  solid: true
  opaque: true
  textures:
    all: chest.block.png

# --- Light sources (ISSUES #13B) ----------------------------------------------
# Torch: a placeable block-light source. Cross-rendered (walk through it, breakable
# like foliage) and non-opaque so its light floods the surroundings through the
# existing block-light flood — lights caves and the night. Appended last.
- name: torch
  hardness: 0.1
  solid: false
  opaque: false
  light: 20
  light_color: [1.00, 0.58, 0.22]   # warm flame orange
  render: cross
  textures:
    all: torch.block.png

# --- Flora expansion: ground plants (ISSUES #13F) -----------------------------
# Cross-rendered sprite plants (walk through, break instantly like other foliage)
# scattered by biome in worldgen (World::generateColumn, gated by the biome's
# `plant:` theme). Non-solid + non-opaque so they don't cull terrain or block
# light. Appended at the very end so existing block ids / saved chunks don't shift.
- name: tall_grass
  hardness: 0.0
  solid: false
  opaque: false
  render: cross
- name: fern
  hardness: 0.0
  solid: false
  opaque: false
  render: cross
- name: flower_red
  hardness: 0.0
  solid: false
  opaque: false
  render: cross
- name: flower_yellow
  hardness: 0.0
  solid: false
  opaque: false
  render: cross
- name: red_mushroom
  hardness: 0.0
  solid: false
  opaque: false
  render: cross
# Cactus: a slim solid column (render: model), like the tree trunk. Solid (you
# can't walk through it) but non-opaque (thinner than the cell). Stacks 1-3 tall.
- name: cactus
  hardness: 0.4
  solid: true
  opaque: false
  render: model
  light_opacity: 4       # trunk/column dims the sky below it (kept <15 so its own
                         # rendered cell still receives light — a model samples its
                         # own cell, unlike an opaque cube whose faces read neighbours)
  model:
    width: 12

# --- Flora expansion: tree species (ISSUES #13F) ------------------------------
# Each species = a trunk (render: model, like oak_trunk) + a leafcube canopy, the
# same primitives oak uses. World::generateColumn picks the species from the root
# column's biome `tree:` and shapes the canopy per species (ellipsoid / conical /
# drooping). Appended at the end so existing block ids / saved chunks don't shift.
- name: birch_trunk
  hardness: 1.5
  solid: true
  opaque: false
  render: model
  light_opacity: 4       # trunk/column dims the sky below it (kept <15 so its own
                         # rendered cell still receives light — a model samples its
                         # own cell, unlike an opaque cube whose faces read neighbours)
  model:
    width: 8          # slimmer than oak (12) — birches are thin
  textures:
    top: birch_log_top.block.png
    bottom: birch_log_top.block.png
    side: birch_log_side.block.png
- name: birch_leaves
  hardness: 0.1
  solid: false
  opaque: false
  render: leafcube
  light_opacity: 3       # canopy dims the sky a few levels -> dappled shade below
  textures:
    all: birch_leaves.block.png
