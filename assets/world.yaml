# =============================================================================
#  World generation configuration
# =============================================================================
#  READ BY:   vg::WorldConfig::load (src/world/WorldConfig.{h,cpp}) at startup.
#  USED BY:   vg::World (src/world/World.cpp) — the procedural terrain generator
#             (column heights, material layering) and the world's chunk grid.
#
#  WHY THIS FILE EXISTS
#  --------------------
#  Project convention (docs/CONFIGURATION.md): tunable values are documented data,
#  not magic numbers in code. These were previously constexprs in World.cpp and
#  App.h. Edit them here and relaunch — no recompile. Any field omitted falls back
#  to the matching default in WorldConfig.h, so a missing file still makes a world.
#
#  Heads-up: changing world size or any terrain value reshapes the world from
#  scratch on the next launch (there is no save format yet).
# =============================================================================

# Procedural seed. The same seed always regenerates the identical world; change
# it for a different world from the same settings. Ignored when random_seed is true.
seed: 2137

# Draw a fresh random seed every launch (a new world each time). The chosen seed is
# printed at startup ("[world] seed N") so you can pin it back here (with
# random_seed: false) if you find one you like. Edited chunks save under
# saves/<seed>/, so each random world gets its own save folder.
random_seed: true

# Dynamic chunk streaming (docs/STREAMING.md). false = the fixed island world,
# generated once around the origin (original behaviour). true = the loaded window
# follows the player for an endless world (island shaping is disabled, terrain is
# rolling hills everywhere). EXPERIMENTAL — moving the window relights/remeshes the
# leading edge on the main thread, so expect a brief hitch each time you cross a
# chunk boundary (worker threads fix this in a later stage). Lower view_radius to
# soften the hitch while testing.
streaming: true

# Background threads that mesh streamed-in chunks (streaming only). 0 = mesh on the
# main thread, spread over a few frames (no worker threads). >0 offloads greedy
# meshing to that many workers, so crossing a chunk boundary no longer stutters —
# the main thread only uploads finished meshes. Set 0 if threading ever misbehaves.
stream_workers: 8

# Relight streamed-in chunks on a background thread (streaming only). The light
# flood at each chunk boundary is the last big cost still on the main thread; this
# moves it off-thread so crossing a boundary no longer stutters. Generation + the
# window move stay on the main thread (so there are no window races); the worker
# only touches the just-generated edge. EXPERIMENTAL — set false to relight on the
# main thread (the proven path) if you ever see a crash or a lighting glitch.
async_streaming: true

# Streaming window radius, in chunks, kept loaded around the player horizontally
# (each chunk is Chunk::kSize = 16 blocks per axis). The world is a (2*view_radius+1)
# square that follows the player.
#   e.g. view_radius 9 -> 19x19 chunks = 304 blocks wide. Larger = sees farther but
#   costs more memory, a longer startup, and a bigger hitch each time you cross a
#   chunk boundary (more columns to generate/relight/remesh on the leading edge).
#   Kept low (4) because the world is 256 blocks tall (height_chunks 16): every
#   column the window streams in is 16 chunks of generate/relight/remesh, so a wide
#   radius makes each boundary crossing hitch. Raise it for more view distance only
#   if you can take the bigger per-boundary cost (or lower height_chunks first).
view_radius: 4

# Vertical extent of the world, in chunks (no vertical streaming). 16 * 16 = 256
# blocks tall, sea level 48 (biomes.yaml sea_level; snow_line + splines are scaled
# to match). This is the dominant per-boundary streaming cost: each entering column
# is height_chunks chunks of generate + relight + remesh. Dropping to 8 (= 128 tall)
# roughly HALVES that cost (the biggest streaming-lag lever) — but check the island
# /mountains still look right, and halve biomes.yaml's sea_level + spline y-values +
# snow_line + the ores max_y to match.
height_chunks: 16

# -----------------------------------------------------------------------------
#  stream_tuning: per-machine performance knobs for the chunk-streaming pipeline
#  (docs/STREAMING.md). These used to be inline constants in the engine (REVIEW
#  R7). Defaults match those values, so leaving the block out changes nothing.
#  Watch the VG_FRAME_TIME profiler (and VG_MESH_TIME at startup) when tuning.
# -----------------------------------------------------------------------------
stream_tuning:
  # Finished worker meshes uploaded to the GPU per frame in steady state. Each
  # upload builds a device buffer, so a high budget spikes the frame on a slow
  # GPU; too low and a streamed-in edge melts in visibly. what: per-frame upload
  # count; where: WorldRenderer::streamPump; effect: higher = fills faster, costs
  # more per frame.
  pump_budget: 20
  # Boosted pump_budget used WHILE a large backlog melts in (startup rings, a
  # falloff-driven remesh-all). Higher = the view fills faster after a load at the
  # cost of a few busier frames. Clamped to >= pump_budget.
  melt_budget: 64
  # Chunks around the spawn meshed+uploaded synchronously before the first frame;
  # everything outside this radius streams in afterwards. Smaller = faster first
  # frame, more visible melt-in. (Ignored when streaming is off.)
  core_radius: 5
  # Chunks per GPU submit in the one-time startup batch upload. Bounded by Vulkan's
  # maxMemoryAllocationCount (~4096) since each chunk holds a live allocation while
  # its slice is in flight; rarely needs changing.
  upload_slice: 384

# -----------------------------------------------------------------------------
#  liquids: water/lava flow budget per 0.2s tick. Bigger spreads look better but
#  cost more cells filled + a larger remesh every tick while flowing (REVIEW R7).
# -----------------------------------------------------------------------------
liquids:
  # Cells a single tick fills before stopping (the whole tick is one light flood).
  max_fills: 16
  # Cheap blockAt reads per tick used to drain already-settled queue cells.
  scan: 4096
  # Rings a source spreads before the thin edge stops (level 0 source .. max_level
  # edge). 3 ≈ a 7-wide puddle; raise for wider pools, but each ring is more fills
  # and a bigger per-tick remesh.
  max_level: 3

# -----------------------------------------------------------------------------
#  Terrain SHAPE + surface materials (height, mountains, beaches, biome rings) are
#  authored in assets/biomes.yaml and driven by vg::TerrainGenerator. The old
#  `terrain:` (single-noise height/material) and `island:` (radial mask) blocks that
#  lived here were removed — they were no longer read by generation.
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
#  Surface decoration (trees, bushes, ground cover, lanterns, cairns, geodes) is
#  authored entirely as procedural FEATURES — assets/features/*.yaml, edited in
#  tools/feature_tool.py. The old built-in `features:` scatter block (lantern_/
#  cairn_/geode_/tree_/bush_density) was removed; it is no longer read.
#  NOTE: the biomes.yaml per-biome `trees:`/`tree:` values still drive the
#  far-terrain LOD tree impostors (far_terrain.trees), not near-chunk geometry.
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
#  structures: hand-authored voxel templates (assets/structures/*.yaml) stamped
#  sparsely on land — wells, boulders, glowing pillars. Candidate origins sit on a
#  coarse grid: every `spacing` blocks a cell has a `density` chance of rooting one
#  (jittered within the cell, picked by weight). Seam-safe: each column gathers the
#  nearby origins whose footprint covers it, so a structure is identical regardless
#  of chunk load order. density: 0 disables them. Author new ones by dropping a YAML
#  in assets/structures/ (see the files there for the layer/legend format).
# -----------------------------------------------------------------------------
structures:
  spacing: 80      # average blocks between candidate structure cells
  # UNIFIED: structures are now features (assets/features/well.yaml, pillar.yaml, ...
  # as `voxels` ops). density 0 turns off the legacy structure scatter so nothing is
  # generated twice. Edit them in tools/feature_tool.py like any other feature.
  density: 0.0     # chance a candidate cell actually roots a structure (0 = off)

# -----------------------------------------------------------------------------
#  ores: iron replaces stone in small clusters (one roll shared across a 2x2x2
#  block cell, so it comes in little veins) anywhere below max_y.
#    density  per-cell probability (0..1). ↑ = more common ore; ↓ = rarer.
#    max_y    absolute world Y ceiling for ore (relative to sea_level 24 and the
#             world ceiling). ↑ = ore reaches higher up; scale with height_chunks.
# -----------------------------------------------------------------------------
ores:
  iron: {density: 0.014, max_y: 48}

# NOTE: light falloff (how fast sky/block light dies per spread step) is a
# player-facing option — it lives in assets/settings.yaml ("skyFalloff" /
# "blockFalloff") and is adjustable in the Esc menu, not here.
